<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SignupDoggy — Disposable Email, VPN &amp; Tor Detection API · $0.01/call</title>

    <!-- Favicons + PWA (per-route meta is injected by prerender + SEO.tsx) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!--
      The preconnect hints for Google Fonts + the TownSquare footer widget
      origin are injected by the prerender step (scripts/prerender.mjs →
      buildHead) so every route gets exactly one preconnect per origin.
      Keeping them in one place avoids duplicates in the prerendered HTML —
      Lighthouse flags more than 4 preconnect connections as a warning.
    -->
        <link
          rel="preload"
          as="style"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap"
        />
        <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap"
          media="print"
          onload="this.media='all'"
        />
        <noscript>
          <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap"
          />
        </noscript>

    <!-- TownSquare footer widget (below-the-fold, async-loaded so it never blocks first paint) -->
    <link rel="preload" as="style" href="https://townsquare.cauenapier.com/widget.css" />
    <link
      rel="stylesheet"
      href="https://townsquare.cauenapier.com/widget.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://townsquare.cauenapier.com/widget.css" />
    </noscript>

    <!-- SEO defaults (overridden per-route by prerender + SEO.tsx) -->
    <meta
      name="description"
      content="Serverless fraud-detection API for SaaS signups. Catches disposable emails, VPN/Tor exit nodes, and bot patterns in one POST. $0.01 per request, no monthly fee, no sales call."
    />
    <meta
      name="keywords"
      content="fraud detection API, fake signup detection, disposable email checker, VPN detection API, Tor exit node API, signup fraud, email validation API, IP risk score, fraud prevention, indie hacker, SaaS fraud, signupdoggy"
    />
    <meta name="author" content="Jeffrin James" />
    <link rel="canonical" href="https://signupdoggy.pages.dev" />

    <!-- AEO / SEO discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="alternate" type="text/plain" href="/llms.txt" title="llms.txt — plain-text index for AI agents" />

    <!-- Open Graph -->
    <meta property="og:title" content="SignupDoggy — Catch fake signups in 1¢" />
    <meta
      property="og:description"
      content="Disposable emails. VPN exits. Tor nodes. One POST, one score, 1¢ a call. No monthly fee."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://signupdoggy.pages.dev" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://signupdoggy.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SignupDoggy — Catch fake signups in 1¢. One API. 1¢ per request." />
    <meta property="og:site_name" content="SignupDoggy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catch fake signups in 1¢" />
    <meta
      name="twitter:description"
      content="One API. Disposable emails + VPN + Tor detection. 1¢ a request. No monthly fee. No sales call."
    />
    <meta name="twitter:image" content="https://signupdoggy.pages.dev/og-image.png" />
    <meta name="twitter:image:alt" content="SignupDoggy — Catch fake signups in 1¢" />
    <meta name="twitter:site" content="@signupdoggy" />
  </head>
  <body>
    <div id="root"></div>

    <!--
      TownSquare footer widget — async-loaded so it never blocks first paint.
      The stylesheet is loaded with the media="print" + onload swap pattern in
      the <head> above. The mount <div> and ES module <script> live OUTSIDE
      the React root (sibling of #root) so React never wipes them, and the
      inline module script runs after DOM parse with the div already present
      in the document. The widget self-sizes and styles itself; our theme
      overrides (host palette) live in src/styles.css.
    -->
    <div id="townsquare-root"></div>
    <script type="module">
      import { mountTownSquare } from "https://townsquare.cauenapier.com/townsquare.mjs";

      mountTownSquare(document.getElementById("townsquare-root"), {
        serverOrigin: "https://townsquare.cauenapier.com",
        siteKey: "site__1BzllsokQYI7JEt",
        scene: {"benches":2,"benchXs":[0.2,0.72],"trees":1,"treeXs":[0.8],"lamps":1,"lampXs":[0.12],"birds":3},
        theme: "host"
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
