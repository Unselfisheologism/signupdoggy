# Cloudflare Pages wrangler config — signupdoggy.pages.dev
#
# Wraps the static site bundle in dist/ (one level up from this
# file) with the AEO edge layer (aeo/worker.ts) so we get AI bot
# detection + content negotiation at the edge. Bundling is done by
# `npm run aeo:build:worker` → dist/_worker.js.
#
# Deploy with:  npm run aeo:deploy
# Local dev:    npm run aeo:dev      (wrangler dev on :8787)
#
# Note: run_worker_first = true is REQUIRED. Without it, Cloudflare
# serves matching static files directly and the worker is skipped —
# meaning no negotiation, no Link header, no markdown serving for
# AI crawlers. See https://developers.cloudflare.com/pages/functions/custom-workers/

name = "signupdoggy-pages"
# Cloudflare Pages with a custom _worker.js: `main` points at the
# pre-bundled worker (produced by `npm run aeo:build:worker` →
# ../dist/_worker.js). Pages automatically picks this up at
# deploy time, but wrangler dev also needs to know the entry.
main = "../dist/_worker.js"
compatibility_date = "2026-05-04"
compatibility_flags = ["nodejs_compat"]

# Pages reads the Vite build output from ../dist. We do NOT define
# [build] here because `wrangler deploy` for a Pages project just
# uploads the assets directory + the _worker.js. For local dev we
# run `npm run build` once and then `wrangler dev` serves from
# the resulting dist/.
#
# The "directory" path is relative to THIS wrangler.toml file.

[assets]
directory = "../dist"
binding = "ASSETS"
run_worker_first = true
# html_handling = "auto-trailing-slash" is the default; we set
# trailingSlash = "never" in worker.ts to mirror the React Router
# behavior (no trailing slashes).
#
# not_found_handling = "single-page-application" makes the ASSETS
# binding fall through to /index.html for any path that has no
# matching file. This is what we want for a React SPA — every
# client-side route (/docs, /pricing, /terms, /privacy) returns
# the same index.html shell. The Worker then injects the right
# Link rel="alternate" header for whichever route was hit.
# Without this, /docs returns 404 from ASSETS and the SPA shell
# never loads, which also breaks the html.reachable AEO check.
not_found_handling = "single-page-application"

# Optional: Analytics Engine dataset for AEO traffic observability.
# See https://developers.cloudflare.com/analytics/analytics-engine/
# Uncomment after creating the dataset in the Cloudflare dashboard.
#
# [[analytics_engine_datasets]]
# binding = "AI_AGENT_ANALYTICS"
# dataset = "signupdoggy_aeo_events"

# Environment variables. Add secrets via `wrangler secret put NAME`.
[vars]
# Advertised AEO spec version. Mirrored in aeo/llms-config.ts and
# surfaced by createAEOWorker via the X-AEO-Version response header.
AEO_SPEC_VERSION = "1.0"
